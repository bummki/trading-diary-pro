    <!-- ✅ 테마(다크/라이트) 초기화: 항상 한 가지 클래스만 유지 -->
    <script>
      (function () {
        const KEY = 'trading-diary-theme';
        const root = document.documentElement;
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const saved = localStorage.getItem(KEY); // 'dark' | 'light' | null
        const theme = saved || (prefersDark ? 'dark' : 'light');

        root.classList.remove('dark','light');
        root.classList.add(theme);
        root.style.colorScheme = theme;

        // 시스템 테마 변경 자동 반영(사용자 저장값이 없을 때만)
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const onChange = (e) => {
          if (!localStorage.getItem(KEY)) {
            const next = e.matches ? 'dark' : 'light';
            root.classList.remove('dark','light');
            root.classList.add(next);
            root.style.colorScheme = next;
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', next === 'dark' ? '#0b1220' : '#ffffff');
          }
        };
        if (mq.addEventListener) mq.addEventListener('change', onChange);
        else mq.addListener(onChange);

        // ✅ 전역 토글 함수(앱에서 window.setTheme('dark'|'light'|'system')로 호출)
        window.setTheme = function (next) {
          if (next === 'system') {
            localStorage.removeItem(KEY);
            const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const sysTheme = sysDark ? 'dark' : 'light';
            root.classList.remove('dark','light');
            root.classList.add(sysTheme);
            root.style.colorScheme = sysTheme;
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', sysTheme === 'dark' ? '#0b1220' : '#ffffff');
            return;
          }
          localStorage.setItem(KEY, next);
          root.classList.remove('dark','light');
          root.classList.add(next);
          root.style.colorScheme = next;
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', next === 'dark' ? '#0b1220' : '#ffffff');
        };
        window.getTheme = () => (root.classList.contains('dark') ? 'dark' : 'light');
      })();
    </script>

    <!-- ✅ 전역 테마 변수 + 모바일 최적화 -->
    <style>
      /* ===== 전역 테마 변수 ===== */
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --fg: #0b1220;
        --muted: #64748b;
        --card: #f8fafc;
        --border: #e2e8f0;
        --primary: #3b82f6;
        --primary-contrast: #ffffff;
      }
      .dark {
        color-scheme: dark;
        --bg: #0b1220;
        --fg: #e6edf3;
        --muted: #94a3b8;
        --card: #0f172a;
        --border: #1f2937;
        --primary: #60a5fa;
        --primary-contrast: #0b1220;
      }

      /* ===== 베이스 ===== */
      html, body {
        overflow-x: hidden !important;
        max-width: 100vw !important;
        margin: 0 !important;
        padding: 0 !important;
        background: var(--bg);
        color: var(--fg);
        -webkit-tap-highlight-color: transparent; /* 모바일 탭 하이라이트 제거 */
      }
      * { box-sizing: border-box !important; max-width: 100vw !important; }
      a { color: var(--primary); text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* 카드/버튼 예시(변수 기반) */
      .card, [class*="card"] {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      button {
        background: var(--primary);
        color: var(--primary-contrast);
        border: none;
        border-radius: 10px;
        padding: 0.5rem 0.75rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: .6; cursor: not-allowed; }

      /* 🔒 다크 전환 시 클릭 가로막는 오버레이 방지 (안전장치) */
      [data-overlay],
      .overlay,
      .backdrop {
        /* 프로젝트에서 해당 클래스를 쓴다면 다크모드일 때 클릭 막힘 방지 */
        pointer-events: none;
      }

      /* ===== 반응형: 모바일 최적화 ===== */
      #root { max-width: 100vw !important; overflow-x: hidden !important; }

      @media (max-width: 768px) {
        button {
          font-size: 0.625rem !important;
          padding: 0.25rem 0.375rem !important;
          white-space: nowrap !important;
          min-width: auto !important;
          flex-shrink: 1 !important;
          max-width: none !important;
        }
        [role="tab"], .nav-tab, .tab {
          flex: 1 !important;
          min-width: 0 !important;
          font-size: 0.75rem !important;
          text-align: center !important;
          padding: 0.5rem 0.25rem !important;
          overflow: hidden !important;
          text-overflow: ellipsis !important;
        }
        .flex, [class*="flex"] { min-width: 0 !important; max-width: 100% !important; }
        .flex > *, [class*="flex"] > * { min-width: 0 !important; flex-shrink: 1 !important; }
        .grid, [class*="grid"] { min-width: 0 !important; max-width: 100% !important; }
        .grid > *, [class*="grid"] > * { min-width: 0 !important; overflow: hidden !important; }
        .card, [class*="card"] { width: 100% !important; max-width: 100% !important; overflow: hidden !important; }
      }
      @media (max-width: 375px) {
        button { font-size: 0.5rem !important; padding: 0.2rem 0.3rem !important; }
        [role="tab"], .nav-tab, .tab { font-size: 0.625rem !important; padding: 0.4rem 0.2rem !important; }
      }
      @media (max-width: 320px) {
        button { font-size: 0.45rem !important; padding: 0.15rem 0.25rem !important; }
        [role="tab"], .nav-tab, .tab { font-size: 0.5rem !important; padding: 0.3rem 0.15rem !important; }
      }
    </style>
